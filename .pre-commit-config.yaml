repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.4.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-added-large-files
  - id: check-ast
  - id: detect-private-key

- repo: local
  hooks:
  - id: flake8
    name: flake8
    entry: uv run flake8 --config=.flake8
    language: system
    types: [python]

  - id: isort
    name: isort
    entry: uv run isort
    language: system
    types: [python]

  - id: black
    name: black
    entry: uv run black
    language: system
    types: [python]

  - id: bandit
    name: bandit
    entry: uv run bandit -c pyproject.toml
    language: system
    types: [python]

  - id: pylint
    name: pylint
    entry: uv run pylint --rcfile=.pylintrc --fail-under=9.0
    language: system
    types: [python]
