name: Docs Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ruby/setup-ruby@e65c17d16e57e481586a6a5a0282698790062f92 # v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build AgentIRC docs
        run: bundle exec jekyll build --config _config.base.yml,_config.agentirc.yml -d _site_agentirc
        env:
          JEKYLL_ENV: production

      - name: Build Culture docs
        run: bundle exec jekyll build --config _config.base.yml,_config.culture.yml -d _site_culture
        env:
          JEKYLL_ENV: production

      - name: Verify sites tag on all doc files
        run: |
          MISSING=$(grep -rL "^sites:" docs/ --include="*.md" | grep -v superpowers | grep -v resources | grep -v README || true)
          if [ -n "$MISSING" ]; then
            echo "ERROR: The following doc files are missing a 'sites:' front matter tag:"
            echo "$MISSING"
            exit 1
          fi
          echo "All doc files have sites: tags."
