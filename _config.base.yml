title: ""
description: ""
baseurl: ""
url: ""

theme: just-the-docs
color_scheme: dark-terminal

search_enabled: true
search:
  button: true

plugins:
  - jekyll-seo-tag
  - jekyll-relative-links
  - jekyll-sitemap

relative_links:
  enabled: true
  collections: false

defaults:
  - scope:
      path: ""
    values:
      layout: "default"

exclude:
  - README.md
  - CLAUDE.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - .github/
  - .claude/
  - .superpowers/
  - culture/
  - server/
  - clients/
  - protocol/
  - tests/
  - pyproject.toml
  - uv.lock
  - __pycache__/
  - packages/
  - scripts/
  - plugins/
  - _site/
  - _site_agentirc/
  - _site_culture/
  - docs/superpowers/
  - docs/resources/
  - culture.yaml
